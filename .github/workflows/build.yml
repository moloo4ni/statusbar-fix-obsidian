name: Build and Release Magisk Module

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Module via build.sh
        run: ./build.sh
        env:
          SDK_DIR: ${{ env.ANDROID_HOME }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
